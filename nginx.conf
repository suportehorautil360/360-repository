server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA (react-router): qualquer rota cai no index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Assets com hash → cache longo.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
